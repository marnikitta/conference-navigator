name: Deploy
concurrency: production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/deployment.key
          chmod 600 ~/.ssh/deployment.key

          if [ -n "$SSH_HOST_KEY" ]; then
            echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          fi

          cat >>~/.ssh/config <<END
          Host deploy-target
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/deployment.key
            StrictHostKeyChecking yes
            Port ${SSH_PORT:-22}
          END
        env:
          SSH_USER: ${{ secrets.DEPLOYMENT_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOYMENT_SSH_HOST }}
          SSH_HOST_KEY: ${{ secrets.DEPLOYMENT_SSH_HOST_KEY }}
          SSH_PORT: ${{ secrets.DEPLOYMENT_SSH_PORT }}

      - name: Deploy
        run: rsync -avz --delete dist/ deploy-target:~/conference-navigator/
